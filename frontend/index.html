<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Stack App — Live Data</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .header {
      max-width: 800px;
      margin: 0 auto 32px;
    }
    .badge {
      display: inline-block;
      background: #238636;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    h1 { font-size: 32px; color: #58a6ff; margin-bottom: 6px; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 20px; }
    .status-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    .dot-yellow { background: #d29922; }
    .dot-red { background: #f85149; }
    .main { max-width: 800px; margin: 0 auto; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 16px; color: #e6edf3; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 12px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    input[type="text"], select, textarea {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: #58a6ff;
    }
    input[type="text"].name-input { flex: 1; min-width: 200px; }
    input[type="text"].desc-input { flex: 2; min-width: 200px; }
    select { min-width: 120px; }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.15s;
    }
    .btn-green { background: #238636; color: #fff; border: 1px solid #2ea043; }
    .btn-green:hover { background: #2ea043; }
    .btn-blue { background: #1f6feb; color: #fff; }
    .btn-blue:hover { background: #388bfd; }
    .btn-red { background: #da3633; color: #fff; }
    .btn-red:hover { background: #f85149; }
    .btn-ghost { background: transparent; color: #8b949e; border: 1px solid #30363d; }
    .btn-ghost:hover { background: #21262d; color: #e6edf3; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .items-list { display: flex; flex-direction: column; gap: 12px; }
    .item-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .item-card:hover { border-color: #58a6ff; }
    .item-info { flex: 1; }
    .item-name { font-size: 15px; font-weight: bold; color: #e6edf3; margin-bottom: 4px; }
    .item-desc { font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    .item-meta { font-size: 12px; color: #6e7681; }
    .status-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .status-active { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .status-pending { background: rgba(210,153,34,0.15); color: #d29922; border: 1px solid rgba(210,153,34,0.3); }
    .status-done { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(58,166,255,0.3); }
    .item-actions { display: flex; gap: 8px; }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #6e7681;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-success { background: #238636; color: #fff; }
    .toast-error { background: #da3633; color: #fff; }
    .loading { text-align: center; padding: 32px; color: #8b949e; }
    .count-badge {
      background: #30363d;
      color: #8b949e;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">✦ v3.0 — MONGODB + JEST + JENKINS</div>
    <h1>Full Stack App</h1>
    <p class="subtitle">Real data from MongoDB — Add, update, and delete items live</p>
    <div class="status-bar">
      <div class="status-pill">
        <div class="dot dot-green"></div>
        <span>Frontend — Nginx</span>
      </div>
      <div class="status-pill">
        <div class="dot" id="backendDot" style="background:#d29922"></div>
        <span>Backend — <span id="backendText">Checking...</span></span>
      </div>
      <div class="status-pill">
        <div class="dot" id="dbDot" style="background:#d29922"></div>
        <span>MongoDB — <span id="dbText">Checking...</span></span>
      </div>
    </div>
  </div>

  <div class="main">

    <!-- ADD ITEM FORM -->
    <div class="card">
      <h2>Add New Item</h2>
      <div class="form-row">
        <input type="text" class="name-input" id="itemName" placeholder="Item name (required)" maxlength="100">
        <input type="text" class="desc-input" id="itemDesc" placeholder="Description (optional)" maxlength="500">
        <select id="itemStatus">
          <option value="active">Active</option>
          <option value="pending">Pending</option>
          <option value="done">Done</option>
        </select>
        <button class="btn btn-green" id="addBtn" onclick="addItem()">Add Item</button>
      </div>
    </div>

    <!-- ITEMS LIST -->
    <div class="card">
      <h2>
        All Items
        <span class="count-badge" id="itemCount">0</span>
      </h2>
      <div class="items-list" id="itemsList">
        <div class="loading">Loading items from MongoDB...</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://' + window.location.hostname + ':5000';

    // ── STATUS CHECK ──────────────────────────────────────────────
    async function checkStatus() {
      try {
        const res = await fetch(API + '/api/health');
        const data = await res.json();
        document.getElementById('backendDot').style.background = '#3fb950';
        document.getElementById('backendText').textContent = 'Online';
        if (data.database === 'connected') {
          document.getElementById('dbDot').style.background = '#3fb950';
          document.getElementById('dbText').textContent = 'Connected';
        } else {
          document.getElementById('dbDot').style.background = '#d29922';
          document.getElementById('dbText').textContent = 'Disconnected';
        }
      } catch (err) {
        document.getElementById('backendDot').style.background = '#f85149';
        document.getElementById('backendText').textContent = 'Offline';
      }
    }

    // ── LOAD ALL ITEMS ────────────────────────────────────────────
    async function loadItems() {
      try {
        const res = await fetch(API + '/api/items');
        const data = await res.json();
        const list = document.getElementById('itemsList');
        const countBadge = document.getElementById('itemCount');
        countBadge.textContent = data.count || 0;
        if (!data.items || data.items.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No items yet. Add your first item above!</p></div>';
          return;
        }
        list.innerHTML = data.items.map(item => `
          <div class="item-card" id="card-${item._id}">
            <div class="item-info">
              <div class="item-name">${escapeHtml(item.name)}</div>
              ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
              <div class="item-meta">Created: ${new Date(item.createdAt).toLocaleString()}</div>
            </div>
            <select class="status-badge status-${item.status}" onchange="updateStatus('${item._id}', this.value)" style="background:transparent;border:none;cursor:pointer;font-weight:bold;font-size:12px;">
              <option value="active" ${item.status==='active'?'selected':''}>Active</option>
              <option value="pending" ${item.status==='pending'?'selected':''}>Pending</option>
              <option value="done" ${item.status==='done'?'selected':''}>Done</option>
            </select>
            <div class="item-actions">
              <button class="btn btn-red" onclick="deleteItem('${item._id}', '${escapeHtml(item.name)}')">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('itemsList').innerHTML = '<div class="empty-state"><p style="color:#f85149">Error loading items: ' + err.message + '</p></div>';
      }
    }

    // ── ADD ITEM ──────────────────────────────────────────────────
    async function addItem() {
      const name = document.getElementById('itemName').value.trim();
      const description = document.getElementById('itemDesc').value.trim();
      const status = document.getElementById('itemStatus').value;
      if (!name) { showToast('Name is required', 'error'); document.getElementById('itemName').focus(); return; }
      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = 'Adding...';
      try {
        const res = await fetch(API + '/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, status })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        document.getElementById('itemName').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('itemStatus').value = 'active';
        showToast('Item added successfully!', 'success');
        await loadItems();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Add Item';
      }
    }

    // ── UPDATE STATUS ─────────────────────────────────────────────
    async function updateStatus(id, status) {
      try {
        const res = await fetch(API + '/api/items/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (!res.ok) throw new Error('Update failed');
        showToast('Status updated!', 'success');
        await loadItems();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    // ── DELETE ITEM ───────────────────────────────────────────────
    async function deleteItem(id, name) {
      if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
      try {
        const res = await fetch(API + '/api/items/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        showToast('Item deleted!', 'success');
        await loadItems();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    let toastTimer;
    function showToast(msg, type) {
      clearTimeout(toastTimer);
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast-' + type + ' show';
      toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    // ── INIT ──────────────────────────────────────────────────────
    checkStatus();
    loadItems();

    // Press Enter in name field to submit
    document.getElementById('itemName').addEventListener('keypress', e => {
      if (e.key === 'Enter') addItem();
    });
  </script>
</body>
</html>
